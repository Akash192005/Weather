<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherWise Pro | Advanced Weather App</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.5s ease;
        }

        /* Weather-based dynamic backgrounds */
        body.clear-sky { background: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%); }
        body.few-clouds { background: linear-gradient(135deg, #536976 0%, #292e49 100%); }
        body.rain { background: linear-gradient(135deg, #232526 0%, #414345 100%); }
        body.snow { background: linear-gradient(135deg, #e6e9f0 0%, #eef1f5 100%); }
        body.thunderstorm { background: linear-gradient(135deg, #0f2027 0%, #203a43 100%); }

        .container {
            width: 100%;
            max-width: 550px;
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
            animation: fadeInUp 0.6s ease;
        }

        .weather-card:hover {
            transform: translateY(-5px);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .header h1 i {
            color: #ffd700;
            margin-right: 10px;
        }

        .header p {
            color: #666;
            font-size: 0.85rem;
        }

        .search-section {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        #city-input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
        }

        #city-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #city-input-btn {
            padding: 14px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        #city-input-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* Popular Cities */
        .popular-cities {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .city-chip {
            background: rgba(102, 126, 234, 0.1);
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .city-chip:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
        }

        /* Weather Info */
        #weather-info {
            display: none;
        }

        .city-name-section {
            text-align: center;
            margin-bottom: 20px;
        }

        #city-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        #date {
            font-size: 0.85rem;
            color: #888;
        }

        .weather-main {
            text-align: center;
            margin-bottom: 25px;
        }

        #temperature {
            font-size: 4rem;
            font-weight: 800;
            color: #ff6b35;
            margin: 10px 0;
        }

        .weather-desc {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
        }

        #weather-icon {
            width: 60px;
            height: 60px;
        }

        #description {
            font-size: 1.1rem;
            color: #666;
            text-transform: capitalize;
        }

        .feels-like {
            font-size: 0.9rem;
            color: #888;
            margin-top: 5px;
        }

        /* Weather Details Grid */
        .weather-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .detail-card {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s;
        }

        .detail-card:hover {
            transform: translateY(-3px);
            background: #fff5f0;
        }

        .detail-card i {
            font-size: 1.5rem;
            color: #ff6b35;
            margin-bottom: 8px;
        }

        .detail-card .label {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-card .value {
            font-size: 1rem;
            font-weight: 700;
            color: #333;
            margin-top: 5px;
        }

        /* Forecast Section */
        .forecast-section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .forecast-section h4 {
            margin-bottom: 15px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .forecast-item {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s;
        }

        .forecast-item:hover {
            transform: translateY(-3px);
            background: #fff5f0;
        }

        .forecast-day {
            font-size: 0.7rem;
            font-weight: 600;
            color: #333;
        }

        .forecast-icon {
            font-size: 1.3rem;
            margin: 5px 0;
        }

        .forecast-temp {
            font-size: 0.85rem;
            font-weight: 700;
            color: #ff6b35;
        }

        /* Loading Animation */
        .loading {
            text-align: center;
            padding: 40px;
        }

        .loading i {
            font-size: 3rem;
            color: #667eea;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Error Message */
        .error-message {
            text-align: center;
            padding: 20px;
            background: #f8d7da;
            border-radius: 15px;
            color: #721c24;
        }

        @media (max-width: 500px) {
            .weather-card { padding: 20px; }
            .forecast-grid { gap: 5px; }
            .forecast-item { padding: 8px; }
            #temperature { font-size: 3rem; }
            .weather-details { gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="weather-card">
            <div class="header">
                <h1><i class="fas fa-cloud-sun"></i> WeatherWise Pro</h1>
                <p>Advanced Weather Forecast • Real-time Updates</p>
            </div>

            <div class="search-section">
                <input type="text" id="city-input" placeholder="Enter city name..." value="New York">
                <button id="city-input-btn"><i class="fas fa-search"></i> Search</button>
            </div>

            <div class="popular-cities">
                <span class="city-chip" data-city="New York">🇺🇸 New York</span>
                <span class="city-chip" data-city="London">🇬🇧 London</span>
                <span class="city-chip" data-city="Tokyo">🇯🇵 Tokyo</span>
                <span class="city-chip" data-city="Paris">🇫🇷 Paris</span>
                <span class="city-chip" data-city="Mumbai">🇮🇳 Mumbai</span>
                <span class="city-chip" data-city="Sydney">🇦🇺 Sydney</span>
            </div>

            <div id="weather-info" class="animate__animated">
                <div class="city-name-section">
                    <h2 id="city-name"></h2>
                    <p id="date"></p>
                </div>

                <div class="weather-main">
                    <div id="temperature"></div>
                    <div class="weather-desc">
                        <img id="weather-icon" alt="Weather Icon">
                        <span id="description"></span>
                    </div>
                    <div class="feels-like" id="feels-like"></div>
                </div>

                <div class="weather-details">
                    <div class="detail-card">
                        <i class="fas fa-tint"></i>
                        <div class="label">Humidity</div>
                        <div class="value" id="humidity"></div>
                    </div>
                    <div class="detail-card">
                        <i class="fas fa-wind"></i>
                        <div class="label">Wind Speed</div>
                        <div class="value" id="wind-speed"></div>
                    </div>
                    <div class="detail-card">
                        <i class="fas fa-tachometer-alt"></i>
                        <div class="label">Pressure</div>
                        <div class="value" id="pressure"></div>
                    </div>
                    <div class="detail-card">
                        <i class="fas fa-eye"></i>
                        <div class="label">Visibility</div>
                        <div class="value" id="visibility"></div>
                    </div>
                    <div class="detail-card">
                        <i class="fas fa-sun"></i>
                        <div class="label">Sunrise</div>
                        <div class="value" id="sunrise"></div>
                    </div>
                    <div class="detail-card">
                        <i class="fas fa-moon"></i>
                        <div class="label">Sunset</div>
                        <div class="value" id="sunset"></div>
                    </div>
                </div>

                <div class="forecast-section">
                    <h4><i class="fas fa-calendar-week"></i> 5-Day Forecast</h4>
                    <div class="forecast-grid" id="forecast-grid"></div>
                </div>
            </div>

            <div id="loading" class="loading" style="display: none;">
                <i class="fas fa-cloud-sun fa-spin"></i>
                <p>Fetching weather data...</p>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://momentjs.com/downloads/moment.min.js"></script>
    <script>
        // API Configuration
        const API_KEY = 'f00c38e0279b7bc85480c3fe775d518c';
        const BASE_URL = 'https://api.openweathermap.org/data/2.5';
        
        // DOM Elements
        const $cityInput = $('#city-input');
        const $searchBtn = $('#city-input-btn');
        const $weatherInfo = $('#weather-info');
        const $loading = $('#loading');
        
        // Weather icon mapping
        const getWeatherIcon = (condition) => {
            const icons = {
                'Clear': 'fas fa-sun',
                'Clouds': 'fas fa-cloud',
                'Rain': 'fas fa-cloud-rain',
                'Drizzle': 'fas fa-cloud-rain',
                'Thunderstorm': 'fas fa-cloud-bolt',
                'Snow': 'fas fa-snowflake',
                'Mist': 'fas fa-smog',
                'Smoke': 'fas fa-smog',
                'Haze': 'fas fa-smog',
                'Fog': 'fas fa-smog'
            };
            return icons[condition] || 'fas fa-cloud-sun';
        };
        
        // Update background based on weather
        const updateBackground = (condition) => {
            const body = $('body');
            body.removeClass();
            const conditionLower = condition.toLowerCase();
            if (conditionLower.includes('clear')) body.addClass('clear-sky');
            else if (conditionLower.includes('cloud')) body.addClass('few-clouds');
            else if (conditionLower.includes('rain') || conditionLower.includes('drizzle')) body.addClass('rain');
            else if (conditionLower.includes('snow')) body.addClass('snow');
            else if (conditionLower.includes('thunder')) body.addClass('thunderstorm');
            else body.addClass('clear-sky');
        };
        
        // Format date
        const formatDate = (timestamp) => {
            return moment(timestamp * 1000).format('MMMM Do YYYY, h:mm:ss a');
        };
        
        // Format time
        const formatTime = (timestamp) => {
            return moment(timestamp * 1000).format('h:mm A');
        };
        
        // Get day name
        const getDayName = (timestamp) => {
            return moment(timestamp * 1000).format('ddd, MMM D');
        };
        
        // Show loading
        const showLoading = () => {
            $weatherInfo.hide();
            $loading.show();
        };
        
        // Hide loading
        const hideLoading = () => {
            $loading.hide();
            $weatherInfo.show().addClass('animate__fadeInUp');
        };
        
        // Show error
        const showError = (message) => {
            $weatherInfo.html(`
                <div class="error-message">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h3>${message}</h3>
                    <p>Please check the city name and try again.</p>
                </div>
            `).show();
            $loading.hide();
        };
        
        // Fetch current weather
        const fetchCurrentWeather = async (city) => {
            const url = `${BASE_URL}/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`;
            const response = await fetch(url);
            if (!response.ok) throw new Error('City not found');
            return await response.json();
        };
        
        // Fetch forecast
        const fetchForecast = async (city) => {
            const url = `${BASE_URL}/forecast?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`;
            const response = await fetch(url);
            if (!response.ok) throw new Error('Forecast not available');
            const data = await response.json();
            
            // Group by day
            const dailyForecasts = {};
            data.list.forEach(item => {
                const date = moment(item.dt * 1000).format('YYYY-MM-DD');
                if (!dailyForecasts[date] && Object.keys(dailyForecasts).length < 5) {
                    dailyForecasts[date] = item;
                }
            });
            return Object.values(dailyForecasts);
        };
        
        // Render weather data
        const renderWeather = (data, forecastData) => {
            const condition = data.weather[0].main;
            const iconClass = getWeatherIcon(condition);
            
            updateBackground(condition);
            
            // Set weather icon src
            const iconUrl = `https://openweathermap.org/img/w/${data.weather[0].icon}.png`;
            $('#weather-icon').attr('src', iconUrl);
            
            // Basic info
            $('#city-name').text(`${data.name}, ${data.sys.country}`);
            $('#date').text(formatDate(data.dt));
            $('#temperature').html(`${Math.round(data.main.temp)}°C`);
            $('#description').text(data.weather[0].description);
            $('#feels-like').html(`Feels like: ${Math.round(data.main.feels_like)}°C`);
            
            // Details
            $('#humidity').text(`${data.main.humidity}%`);
            $('#wind-speed').text(`${data.wind.speed} m/s`);
            $('#pressure').text(`${data.main.pressure} hPa`);
            $('#visibility').text(`${(data.visibility / 1000).toFixed(1)} km`);
            $('#sunrise').text(formatTime(data.sys.sunrise));
            $('#sunset').text(formatTime(data.sys.sunset));
            
            // Forecast
            const forecastHtml = forecastData.map(forecast => {
                const forecastIcon = `https://openweathermap.org/img/w/${forecast.weather[0].icon}.png`;
                return `
                    <div class="forecast-item">
                        <div class="forecast-day">${getDayName(forecast.dt)}</div>
                        <img src="${forecastIcon}" class="forecast-icon" style="width: 30px; height: 30px;">
                        <div class="forecast-temp">${Math.round(forecast.main.temp)}°C</div>
                        <div style="font-size: 0.6rem; color: #888;">${forecast.weather[0].description.split(' ')[0]}</div>
                    </div>
                `;
            }).join('');
            
            $('#forecast-grid').html(forecastHtml);
            hideLoading();
        };
        
        // Main weather function
        const getWeather = async (city) => {
            if (!city || city.trim() === '') {
                showError('Please enter a city name');
                return;
            }
            
            showLoading();
            
            try {
                const [currentData, forecastData] = await Promise.all([
                    fetchCurrentWeather(city),
                    fetchForecast(city)
                ]);
                renderWeather(currentData, forecastData);
                $cityInput.val(currentData.name);
            } catch (error) {
                console.error('Error:', error);
                showError(`Unable to fetch weather for "${city}"`);
            }
        };
        
        // Event Listeners
        $searchBtn.on('click', () => {
            getWeather($cityInput.val().trim());
        });
        
        $cityInput.on('keypress', (e) => {
            if (e.which === 13) {
                getWeather($cityInput.val().trim());
            }
        });
        
        // Popular cities click handler
        $('.city-chip').on('click', function() {
            const city = $(this).data('city');
            $cityInput.val(city);
            getWeather(city);
        });
        
        // Load default city
        getWeather('New York');
    </script>
</body>
</html>
